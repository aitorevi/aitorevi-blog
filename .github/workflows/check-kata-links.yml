name: Check kata links

on:
  pull_request:
    paths:
      - 'src/data/katas.ts'
      - 'scripts/check-kata-links.mjs'
      - '.github/workflows/check-kata-links.yml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - run: node scripts/check-kata-links.mjs

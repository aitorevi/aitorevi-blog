name: Check kata links

on:
  pull_request:
    paths:
      - 'src/data/katas.ts'
      - 'scripts/check-kata-links.mjs'
      - '.github/workflows/check-kata-links.yml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/check-kata-links.mjs
